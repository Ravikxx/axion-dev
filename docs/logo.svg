<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ab0ff"/>
      <stop offset="100%" style="stop-color:#4da6ff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.2"/>

  <!-- ◈ shape — outer diamond -->
  <polygon
    points="64,14 114,64 64,114 14,64"
    fill="none"
    stroke="url(#glow)"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- ◈ shape — inner square (rotated 45°) -->
  <rect
    x="44" y="44" width="40" height="40"
    fill="none"
    stroke="url(#glow)"
    stroke-width="2.5"
    stroke-linejoin="round"
    transform="rotate(0 64 64)"
  />

  <!-- ◈ shape — corner cuts (the notches that make ◈) -->
  <line x1="64" y1="14" x2="64" y2="44" stroke="url(#glow)" stroke-width="2.5"/>
  <line x1="64" y1="84" x2="64" y2="114" stroke="url(#glow)" stroke-width="2.5"/>
  <line x1="14" y1="64" x2="44" y2="64" stroke="url(#glow)" stroke-width="2.5"/>
  <line x1="84" y1="64" x2="114" y2="64" stroke="url(#glow)" stroke-width="2.5"/>

  <!-- Center dot -->
  <circle cx="64" cy="64" r="5" fill="#4da6ff"/>

  <!-- Subtle inner glow -->
  <circle cx="64" cy="64" r="22" fill="#4da6ff" opacity="0.05"/>
</svg>
