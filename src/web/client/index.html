<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axion — AI Coding Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0e10;
      --bg2:         #161618;
      --bg3:         #1e1e22;
      --border:      #2a2a30;
      --text:        #e0e0e0;
      --muted:       #666;
      --blue:        #60a5fa;
      --green:       #4ade80;
      --cyan:        #22d3ee;
      --yellow:      #facc15;
      --red:         #f87171;
      --magenta:     #c084fc;
      --orange:      #fb923c;
      --font:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }

    #root {
      display: flex;
      flex-direction: column;
    }

    /* ── Scrollable message area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 4px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Message rows ── */
    .msg { padding: 4px 0; animation: fadeIn 0.1s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

    .msg-user   { color: var(--text);    padding: 6px 0 2px; }
    .msg-assistant { color: var(--text); padding: 6px 0 2px; }
    .msg-info   { color: var(--muted);  white-space: pre-wrap; }
    .msg-error  { color: var(--red);    padding: 4px 0; }
    .msg-plan   { border-left: 2px solid var(--yellow); padding-left: 10px; margin: 6px 0; }
    .msg-btw    { border: 1px solid var(--magenta); border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
    .msg-thinking-block { border-left: 2px solid var(--magenta); padding-left: 10px; margin: 4px 0 4px 4px; opacity: 0.7; font-size: 12px; }
    .msg-adviser { border-left: 2px solid var(--yellow); padding-left: 10px; margin: 4px 0; }
    .msg-sub-agent { border-left: 2px solid var(--magenta); padding-left: 10px; margin: 2px 0; }
    .msg-agent-msg { color: var(--cyan); opacity: 0.8; font-size: 12px; }

    .msg-label { font-size: 11px; font-weight: bold; margin-bottom: 2px; }
    .user-label  { color: var(--blue); }
    .axion-label { color: var(--green); }
    .plan-label  { color: var(--yellow); }
    .btw-label   { color: var(--magenta); }
    .adviser-label { color: var(--yellow); }
    .sub-label   { color: var(--magenta); }

    .streaming-cursor { display: inline-block; width: 7px; height: 13px; background: var(--green); vertical-align: text-bottom; animation: blink 1s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Code blocks ── */
    pre, code {
      font-family: var(--font);
      font-size: 12px;
    }
    pre {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      margin: 6px 0;
      overflow-x: auto;
      white-space: pre;
    }
    code { background: var(--bg3); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    pre code { background: none; padding: 0; }

    /* ── Rich text ── */
    .rich-text { white-space: pre-wrap; word-break: break-word; }
    .rich-text strong { color: #fff; font-weight: bold; }
    .rich-text em { font-style: italic; color: #ccc; }
    .rich-text h1, .rich-text h2, .rich-text h3 { color: var(--blue); font-size: 13px; margin: 6px 0 2px; }

    /* ── Tool block ── */
    .tool-block {
      display: flex;
      flex-direction: column;
      margin: 3px 0;
      border-radius: 4px;
      overflow: hidden;
    }
    .tool-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }
    .tool-header:hover { border-color: var(--muted); }
    .tool-header.pending { border-color: var(--yellow); opacity: 0.7; }
    .tool-header.success { border-color: #2d5a2d; }
    .tool-header.failure { border-color: #5a2d2d; }
    .tool-name   { color: var(--cyan); font-weight: bold; font-size: 12px; }
    .tool-input  { color: var(--muted); font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tool-status { font-size: 11px; flex-shrink: 0; }
    .tool-status.ok  { color: var(--green); }
    .tool-status.err { color: var(--red); }
    .tool-status.spin { color: var(--yellow); }
    .tool-output {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 6px 8px;
      background: var(--bg2);
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }
    .diff-add { color: var(--green); }
    .diff-rem { color: var(--red); }

    /* ── Confirm prompt ── */
    #confirm-bar {
      background: var(--bg3);
      border-top: 1px solid var(--yellow);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #confirm-bar .confirm-label { color: var(--yellow); flex: 1; font-size: 12px; }
    .confirm-btn {
      padding: 3px 12px;
      border-radius: 4px;
      border: 1px solid;
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .confirm-yes { border-color: var(--green); color: var(--green); background: transparent; }
    .confirm-yes:hover { background: #1a3a1a; }
    .confirm-no  { border-color: var(--red);   color: var(--red);   background: transparent; }
    .confirm-no:hover  { background: #3a1a1a; }

    /* ── Status bar ── */
    #statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      gap: 12px;
      flex-shrink: 0;
    }
    #statusbar .status-left  { display: flex; align-items: center; gap: 8px; }
    #statusbar .status-right { display: flex; align-items: center; gap: 8px; }
    .status-axion  { color: var(--blue); font-weight: bold; font-size: 12px; }
    .status-model  { color: var(--cyan); }
    .status-mode-ask    { color: var(--cyan); }
    .status-mode-auto   { color: var(--green); }
    .status-mode-bypass { color: var(--green); }
    .status-mode-plan   { color: var(--yellow); }
    .status-sep    { color: var(--border); }
    .status-tokens { color: var(--muted); }

    /* ── Thinking spinner ── */
    #thinking-bar {
      padding: 3px 16px;
      background: var(--bg);
      font-size: 12px;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .spinner { display: inline-block; animation: spin-frames 0.8s steps(8) infinite; }
    @keyframes spin-frames {
      0%   { content: '⠋'; } 12%  { content: '⠙'; } 25%  { content: '⠹'; }
      37%  { content: '⠸'; } 50%  { content: '⠼'; } 62%  { content: '⠴'; }
      75%  { content: '⠦'; } 87%  { content: '⠧'; }
    }
    .spinner::before { content: '⠋'; }
    .spinner.s1::before  { content: '⠙'; }
    .spinner.s2::before  { content: '⠹'; }
    .spinner.s3::before  { content: '⠸'; }
    .spinner.s4::before  { content: '⠼'; }
    .spinner.s5::before  { content: '⠴'; }
    .spinner.s6::before  { content: '⠦'; }
    .spinner.s7::before  { content: '⠧'; }

    /* ── Input area ── */
    #input-area {
      display: flex;
      align-items: flex-end;
      padding: 8px 16px 10px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      gap: 8px;
      flex-shrink: 0;
    }
    #input-area .input-prompt { color: var(--blue); font-weight: bold; padding-bottom: 2px; flex-shrink: 0; }
    #chat-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      resize: none;
      min-height: 34px;
      max-height: 150px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #chat-input:focus { border-color: var(--blue); }
    #chat-input::placeholder { color: var(--muted); }
    #chat-input:disabled { opacity: 0.5; }

    /* ── Welcome banner ── */
    .welcome-banner {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      gap: 32px;
    }
    .banner-title { color: var(--blue); font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .banner-sub   { color: var(--muted); font-size: 11px; }
    .banner-row   { display: flex; gap: 8px; font-size: 12px; margin-top: 2px; }
    .banner-key   { color: var(--muted); min-width: 50px; }
    .banner-val   { color: var(--cyan); }
    .banner-tip-title { color: var(--yellow); font-weight: bold; font-size: 12px; margin-bottom: 4px; }
    .banner-tip   { color: var(--muted); font-size: 12px; line-height: 1.7; }

    /* ── Image message ── */
    .msg-img { padding: 6px 0; }
    .msg-img img { margin-top: 4px; }

    /* ── Hint bar ── */
    #hint-bar {
      padding: 2px 16px;
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
