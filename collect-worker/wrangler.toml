name = "axion-collect"
main = "src/index.js"
compatibility_date = "2024-09-23"

# KV namespace — create with:
#   wrangler kv namespace create SESSIONS
# then paste the returned id below
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_KV_ID"

# Routes — point a subdomain at this worker (optional, or use the *.workers.dev URL)
# [[routes]]
# pattern = "collect.yourdomain.com/*"
# zone_name = "yourdomain.com"
