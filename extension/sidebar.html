<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axion</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <!-- Header -->
  <div id="header">
    <span id="logo">◈ Axion</span>
    <div id="header-right">
      <select id="model-select" title="Active model"></select>
      <button id="history-btn" title="Chat history">◷</button>
      <button id="clear-btn" title="New chat">↺</button>
      <button id="settings-btn" title="Settings">⚙</button>
    </div>
  </div>

  <!-- History panel -->
  <div id="history-panel" class="hidden">
    <div id="history-list"></div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden">
    <div class="settings-section">
      <div class="section-title">Import from Axion CLI</div>
      <div class="import-row">
        <span class="hint">Axion must be running (<code>/web</code> in CLI)</span>
        <button id="import-btn">Import keys &amp; endpoints</button>
      </div>
      <div id="import-status"></div>
    </div>

    <div class="settings-section">
      <div class="section-title">API Keys</div>
      <div class="key-grid">
        <label>Anthropic</label>
        <input data-provider="anthropic" type="password" placeholder="sk-ant-…">
        <label>OpenAI</label>
        <input data-provider="openai" type="password" placeholder="sk-…">
        <label>Gemini</label>
        <input data-provider="gemini" type="password" placeholder="AI…">
        <label>Groq</label>
        <input data-provider="groq" type="password" placeholder="gsk_…">
        <label>Mistral</label>
        <input data-provider="mistral" type="password" placeholder="…">
        <label>OpenRouter</label>
        <input data-provider="openrouter" type="password" placeholder="sk-or-…">
      </div>
    </div>

    <div class="settings-section" id="custom-endpoints-section">
      <div class="section-title">Custom Endpoints</div>
      <div id="custom-endpoints-list"></div>
      <div class="ep-add-form">
        <input id="ep-name"    placeholder="Name (e.g. my-gpt4o)">
        <input id="ep-url"     placeholder="Base URL (e.g. https://openrouter.ai/api/v1)">
        <input id="ep-model"   placeholder="Model ID (e.g. openai/gpt-4o)">
        <input id="ep-key"     placeholder="API Key" type="password">
        <button id="ep-add-btn">Add</button>
      </div>
    </div>

    <button id="save-settings-btn">Save</button>
  </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Input -->
  <div id="input-area">
    <div id="token-bar"><span id="token-count"></span></div>
    <div id="input-row">
      <textarea id="input" placeholder="Ask about this page, or tell Axion to do something…" rows="1"></textarea>
      <button id="stop-btn" class="hidden" title="Stop">◼</button>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
